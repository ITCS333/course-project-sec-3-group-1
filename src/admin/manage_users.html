<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="manage_users.js" defer></script>
</head>
<body class="bg-light">
    <header class="bg-dark text-white p-4 text-center">
        <h1>Admin Portal</h1>
    </header>
    <main class="container my-5">
        <section class="card p-4 mb-5 shadow-sm">
            <h2 class="mb-4">Change Your Password</h2>
            <form action="#" id="password-form">
                <fieldset>
                    <legend>Password Update</legend>
                    <div class="mb-3">
                        <label for="current-password" class="form-label">
                            Current Password
                        </label>
                        <input
                            type="password"
                            id="current-password"
                            class="form-control"
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <label for="new-password" class="form-label">
                            New Password
                        </label>
                        <input
                            type="password"
                            id="new-password"
                            class="form-control"
                            minlength="8"
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <label for="confirm-password" class="form-label">
                            Confirm Password
                        </label>
                        <input
                            type="password"
                            id="confirm-password"
                            class="form-control"
                            required
                        >
                    </div>
                    <button
                        type="submit"
                        id="change"
                        class="btn btn-primary"
                    >
                        Update Password
                    </button>
                </fieldset>
            </form>
        </section>
        <section class="card p-4 shadow-sm">
            <h2 class="mb-4">Manage Users</h2>
            <details class="mb-4">
                <summary class="fw-bold mb-3">
                    Add New User
                </summary>
                <form action="#" id="add-user-form">
                    <fieldset>
                        <legend>New User Information</legend>
                        <div class="mb-3">
                            <label for="user-name" class="form-label">
                                Full Name
                            </label>
                            <input
                                type="text"
                                id="user-name"
                                class="form-control"
                                required
                            >
                        </div>
                        <div class="mb-3">
                            <label for="user-email" class="form-label">
                                Email
                            </label>
                            <input
                                type="email"
                                id="user-email"
                                class="form-control"
                                required
                            >
                        </div>
                        <div class="mb-3">
                            <label for="default-password" class="form-label">
                                Default Password
                            </label>
                            <input
                                type="password"
                                id="default-password"
                                class="form-control"
                                minlength="8"
                                required
                            >
                        </div>
                        <div class="mb-3">
                            <label for="is-admin" class="form-label">
                                Role
                            </label>
                            <select
                                id="is-admin"
                                class="form-select"
                            >
                                <option value="0">Student</option>
                                <option value="1">Admin</option>
                            </select>
                        </div>
                        <button
                            type="submit"
                            id="add"
                            class="btn btn-success"
                        >
                            Add User
                        </button>
                    </fieldset>
                </form>
            </details>
            <h3 class="mb-3">Registered Users</h3>
            <input
                type="text"
                id="search-input"
                class="form-control mb-4"
                placeholder="Search by name or email..."
            >
            <div class="table-responsive">
                <table
                    id="user-table"
                    class="table table-bordered table-hover align-middle"
                >
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Admin</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
