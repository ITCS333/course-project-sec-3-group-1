<!--
  Requirement: Create the Student View for Assignments

  Instructions:
  This page is a read-only view for students to see all course assignments.
  Each assignment should link to its dedicated detail page.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Course Assignments</title>

    <link rel="stylesheet" href="style.css">

    <!-- Required: link list.js with defer so the DOM is ready before the
         script runs. -->
    <script src="list.js" defer></script>
</head>
<body>

    <header>
        <h1>Course Assignments</h1>
    </header>

    <main>
        <section id="assignment-list-section">
            <!-- list.js will inject one article per assignment here -->
        </section>
    </main>

</body>
</html>
