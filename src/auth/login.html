<!--
  Requirement: Create a Responsive Login Page

  Instructions:
  Fill in the HTML elements as described in the comments.
  Use the provided IDs for the elements that require them.
  You are encouraged to use a CSS framework for styling, as hinted in the comments,
  but you can also use your own stylesheet.
-->
<!DOCTYPE html>
<html lang="en">
<head>

    
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <title>Login</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

    
    <main>

        
        <section class="card p-4 shadow" style="width: 350px;">

            
            <h2 class="text-center mb-3">Welcome Back!</h2>

         
            <form id="login-form" action="#" method="POST">

                <fieldset>

                    <legend class="text-center fs-6">Secure Login</legend>

                    
                    <label for="email" class="form-label mt-2">Email Address</label>

                    
                    <input type="email" id="email" class="form-control" required>

                    
                    <label for="password" class="form-label mt-3">Password</label>

                    
                    <input type="password" id="password" class="form-control" minlength="8" required>

                   
                    <button type="submit" id="login" class="btn btn-primary w-100 mt-4">
                        Log In
                    </button>

                </fieldset>

                
                <div id="message-container" class="mt-3 text-center"></div>

            </form>

        </section>

    </main>

    
    <script src="login.js" defer></script>

</body>
</html>
