<!--
  Requirement: Create the Dedicated Page for a Single Resource

  Instructions:
  This page displays the details for one resource and allows for discussion.
  All content is loaded dynamically by details.js using the resource id
  from the URL query string (e.g., details.html?id=1).
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >    
        <title>Resource Details</title>

    <link rel="stylesheet" href="style.css">

   
    <script src="details.js" defer></script>

</head>
<body>
     <header>

        <h1 id="resource-title"></h1>

    </header>


    <main>

        <!-- Section 1: Resource Information -->
        <article>
                        <p id="resource-description"></p>

            <a 
                id="resource-link"
                href="#"
                target="_blank"
            >
                Access Resource Material
            </a>
        </article>

        <!-- Section 2: Discussion Forum -->
        <section id="discussion-forum">
            <h2>Discussion</h2>

            <!-- Subsection 2.1: Existing Comments -->
            <div id="comment-list">
                
                <!-- Each comment follows this structure: -->
                <!-- TODO: Use an 'article' for each comment. -->
                    <!-- TODO: Use a 'p' for the comment text. -->
                    <!-- TODO: Use a 'footer' to show the author
                         (e.g., "Posted by: Ali Hassan"). -->
                <!-- End of comment article. -->

            </div>

            <!-- Subsection 2.2: Add a Comment Form -->
            <form id="comment-form" action="#">
                 
                <fieldset>
                    <legend>Leave a Comment</legend>

                    <label for="new-comment">
                        Comment
                    </label>

                    <textarea
                        id="new-comment"
                        required
                    ></textarea>
                    
                    
                    <button type="submit">
                        Post Comment
                    </button>

                </fieldset>
             </form>

        </section>

    </main>

</body>
</html>
